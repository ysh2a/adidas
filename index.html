<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADIDAS SHOP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Noto Sans KR",sans-serif}
body{background:#fff;color:#000}
.top{background:#000;color:#fff;text-align:center;padding:9px;font-weight:bold;font-size:14px}

header{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 13%;
  border-bottom:1px solid #ddd;
  background:#fff;
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{font-size:30px;font-weight:900;letter-spacing:-2px}

nav a{
  margin:0 16px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  color:#000;
}

nav a.active,
nav a:hover{
  border-bottom:3px solid #000;
  padding-bottom:7px;
}

.icons{
  display:flex;
  align-items:center;
  gap:18px;
}

.icons button{
  border:none;
  background:none;
  cursor:pointer;
  padding:0;
}

.icons img{
  width:25px;
  height:25px;
  object-fit:contain;
  display:block;
}

.search{
  display:none;
  padding:15px 13%;
  border-bottom:1px solid #ddd;
  gap:10px;
  background:#fff;
}

.search.active{display:flex}

.search input{
  flex:1;
  height:45px;
  border:none;
  outline:none;
  font-size:18px;
}

.search button{
  width:90px;
  background:#000;
  color:#fff;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.hero{
  height:560px;
  background:
    linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)),
    url("imegas24.webp") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  text-align:left;
  padding-left:13%;
  color:#fff;
}

.hero h1{
  font-size:76px;
  line-height:.95;
  margin-bottom:22px;
  font-weight:900;
}

.hero p{
  font-size:20px;
  margin-bottom:28px;
  font-weight:600;
}

.hero button{
  padding:16px 35px;
  background:#fff;
  color:#000;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

section{width:72%;margin:65px auto}
.title{font-size:34px;margin-bottom:25px}

.category-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.category{
  height:230px;
  position:relative;
  background:#eee;
  overflow:hidden;
  cursor:pointer;
}

.category img{
  width:100%;
  height:100%;
  object-fit:contain;
  transition:.3s;
}

.category:hover img{transform:scale(1.08)}

.category h3{
  position:absolute;
  left:20px;
  bottom:18px;
  background:#000;
  color:#fff;
  padding:8px 15px;
  font-size:25px;
}

.product-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
  padding-bottom:18px;
  margin-bottom:28px;
}

.filter button,
.filter select{
  padding:12px 18px;
  border:1px solid #ccc;
  background:#fff;
  font-weight:bold;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:38px 24px;
}

.card{position:relative;cursor:pointer}

.img-box{
  height:310px;
  background:#f5f5f5;
  position:relative;
  overflow:hidden;
}

.img-box img{
  width:100%;
  height:100%;
  object-fit:contain;
  transition:.3s;
}

.card:hover img{transform:scale(1.07)}

.badge{
  position:absolute;
  top:12px;
  left:12px;
  background:#000;
  color:#fff;
  padding:7px 10px;
  font-size:12px;
  font-weight:bold;
  z-index:2;
}

.sale{background:red}

.heart{
  position:absolute;
  top:12px;
  right:12px;
  border:none;
  background:none;
  font-size:24px;
  cursor:pointer;
  z-index:2;
}

.cart-btn{
  position:absolute;
  left:0;
  bottom:-48px;
  width:100%;
  padding:14px;
  background:#000;
  color:#fff;
  border:none;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

.card:hover .cart-btn{bottom:0}

.colors{display:flex;gap:5px;margin:12px 0}
.dot{width:13px;height:13px;border-radius:50%;border:1px solid #ccc}
.black{background:#000}
.white{background:#fff}
.gray{background:#aaa}

.card h3{font-size:17px;margin-bottom:5px}
.desc{color:#777;font-size:14px;margin-bottom:8px}
.price{font-weight:bold;font-size:17px}
.old{color:#888;text-decoration:line-through;font-size:14px;margin-left:6px}

.cart{
  position:fixed;
  right:-430px;
  top:0;
  width:430px;
  height:100%;
  background:#fff;
  z-index:3000;
  padding:25px;
  box-shadow:-5px 0 20px rgba(0,0,0,.25);
  transition:.3s;
}

.cart.active{right:0}

.cart-head{
  display:flex;
  justify-content:space-between;
  font-size:26px;
  font-weight:bold;
  border-bottom:1px solid #ddd;
  padding-bottom:20px;
}

.close{
  border:none;
  background:none;
  font-size:32px;
  cursor:pointer;
}

.cart-item{
  display:flex;
  gap:12px;
  border-bottom:1px solid #eee;
  padding:15px 0;
}

.cart-item img{
  width:75px;
  height:75px;
  object-fit:contain;
  background:#f5f5f5;
}

.qty button{
  width:26px;
  height:26px;
  border:1px solid #000;
  background:#fff;
  cursor:pointer;
}

.total{margin-top:25px;font-size:21px;font-weight:bold}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:4000;
  justify-content:center;
  align-items:flex-start;
  padding-top:50px;
}

.modal.active{display:flex}

.login{
  width:430px;
  background:#fff;
  padding:30px;
}

.login-head{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

.login-head button{
  border:none;
  background:none;
  font-size:30px;
  cursor:pointer;
}

.tabs{
  display:flex;
  gap:25px;
  border-bottom:1px solid #ddd;
  margin-bottom:25px;
}

.tabs button{
  border:none;
  background:none;
  padding-bottom:12px;
  font-weight:bold;
  cursor:pointer;
}

.tabs .active{border-bottom:3px solid #000}

.login label{
  font-weight:bold;
  display:block;
  margin-bottom:8px;
}

.login input{
  width:100%;
  height:46px;
  border:1px solid #ddd;
  padding:0 12px;
  margin-bottom:16px;
}

.login-btn{
  width:100%;
  height:50px;
  background:#000;
  color:#fff;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.social{
  width:100%;
  height:45px;
  background:#fff;
  border:1px solid #ddd;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
}

.or{text-align:center;color:#777;margin:20px 0}

footer{
  background:#000;
  color:#fff;
  padding:70px 14%;
  margin-top:80px;
}

.news{
  display:flex;
  justify-content:space-between;
  margin-bottom:60px;
}

.news h2{font-size:40px}
.news input{padding:16px;width:300px;background:#111;border:1px solid #555;color:#fff}
.news button{padding:16px 28px;font-weight:bold;cursor:pointer}

.foot{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:40px;
}

.foot p{color:#aaa;margin:12px 0}

@media(max-width:900px){
  header{padding:0 5%}
  nav{display:none}
  section{width:90%}
  .search{padding:15px 5%}
  .grid,.category-grid,.foot{grid-template-columns:repeat(2,1fr)}
  .hero{
    padding:0 6%;
    text-align:center;
    justify-content:center;
  }
  .hero h1{font-size:48px}
  .cart{width:100%}
}

@media(max-width:520px){
  .grid,.category-grid,.foot{grid-template-columns:1fr}
  .news{flex-direction:column;gap:20px}
  .login{width:94%}
}
</style>
</head>

<body>

<div class="top">회원가입 시 15% 할인 + 무료 배송 · 지금 가입하기</div>

<header>
  <div class="logo">adidas</div>

  <nav>
    <a class="nav active" data-category="all">전체</a>
    <a class="nav" data-category="shoes">신발</a>
    <a class="nav" data-category="clothes">의류</a>
    <a class="nav" data-category="sale">세일</a>
  </nav>

  <div class="icons">
    <button onclick="toggleSearch()">
      <img src="images/아이콘/images21.png" alt="검색">
    </button>

    <button onclick="openLogin()">
      <img src="images/아이콘/images22.png" alt="로그인">
    </button>

    <button onclick="openCart()">
      <img src="images/아이콘/images23.jpg" alt="장바구니">
    </button>
  </div>
</header>

<div class="search" id="searchBox">
  <input id="searchInput" type="text" placeholder="상품 검색..." onkeyup="searchProducts()">
  <button onclick="searchProducts()">검색</button>
</div>

<div class="hero" style="
height:650px;
background-image:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
url('images/아이콘/imegas24.webp');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
align-items:center;
padding-left:13%;
color:#fff;
">

  <div style="
  background:rgba(0,0,0,.25);
  padding:35px 45px;
  border-radius:12px;
  backdrop-filter:blur(3px);
  ">

    <h1 style="
    font-size:90px;
    line-height:.9;
    margin-bottom:20px;
    font-weight:900;
    ">
      ADIDAS<br>SHOP
    </h1>

    <p style="
    font-size:24px;
    margin-bottom:30px;
    ">
      Impossible is Nothing
    </p>

    <button onclick="scrollProducts()" style="
    padding:18px 40px;
    background:#fff;
    color:#000;
    border:none;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
    ">
      지금 쇼핑하기
    </button>

  </div>

</div>

<section>
  <h2 class="title">카테고리별 쇼핑</h2>

  <div class="category-grid">
    <div class="category" onclick="filterProducts('shoes')">
      <img src="images/신발/images6.jpg">
      <h3>신발</h3>
    </div>

    <div class="category" onclick="filterProducts('clothes')">
      <img src="images/의류/images16.jpg">
      <h3>의류</h3>
    </div>

    <div class="category" onclick="filterProducts('sale')">
      <img src="images/신발/images10.jpg">
      <h3>세일</h3>
    </div>
  </div>
</section>

<section id="products">
  <div class="product-top">
    <div>
      <h2 class="title" id="pageTitle">인기 상품</h2>
      <p id="countText"></p>
    </div>

    <div class="filter">
      <button onclick="filterProducts('sale')">세일만 보기</button>
      <select onchange="sortProducts(this.value)">
        <option value="recommend">추천순</option>
        <option value="low">낮은 가격순</option>
        <option value="high">높은 가격순</option>
      </select>
    </div>
  </div>

  <div class="grid" id="productGrid"></div>
</section>

<div class="cart" id="cart">
  <div class="cart-head">
    <span>장바구니 (<span id="cartCount">0</span>)</span>
    <button class="close" onclick="closeCart()">×</button>
  </div>

  <div id="cartItems"></div>
  <div class="total" id="cartTotal">총 금액: ₩0</div>
</div>

<div class="modal" id="loginModal">
  <div class="login">
    <div class="login-head">
      <div class="logo">adidas</div>
      <button onclick="closeLogin()">×</button>
    </div>

    <div class="tabs">
      <button class="active">로그인</button>
      <button>회원가입</button>
    </div>

    <form onsubmit="event.preventDefault(); alert('로그인 되었습니다'); closeLogin();">
      <label>이메일</label>
      <input type="email" placeholder="example@email.com" required>

      <label>비밀번호</label>
      <input type="password" placeholder="비밀번호 입력" required>

      <button class="login-btn" type="submit">로그인</button>
    </form>

    <div class="or">또는</div>

    <button class="social">Google로 계속하기</button>
    <button class="social">카카오로 계속하기</button>
  </div>
</div>

<footer>
  <div class="news">
    <div>
      <h2>뉴스레터 구독</h2>
      <p>최신 상품과 할인 정보를 받아보세요</p>
    </div>

    <div>
      <input type="email" placeholder="이메일 주소 입력">
      <button onclick="alert('구독되었습니다')">구독하기</button>
    </div>
  </div>

  <div class="foot">
    <div><h3>고객 서비스</h3><p>주문 조회</p><p>반품 / 교환</p><p>배송 안내</p></div>
    <div><h3>회사 정보</h3><p>브랜드 소개</p><p>지속가능성</p><p>채용</p></div>
    <div><h3>도움말</h3><p>FAQ</p><p>사이즈 가이드</p><p>멤버십</p></div>
    <div><h3>법적 고지</h3><p>개인정보처리방침</p><p>이용약관</p><p>쿠키 정책</p></div>
  </div>
</footer>

<script>
const products = [
  {name:"Adidas Tokyo",desc:"블랙 베이지 레트로 슈즈",price:109000,oldPrice:0,image:"images/신발/images6.jpg",category:"shoes",sale:false},
  {name:"Adidas Spezial Brown",desc:"브라운 스웨이드 스니커즈",price:139000,oldPrice:169000,image:"images/신발/images7.jpg",category:"shoes",sale:true},
  {name:"Adidas Orange Runner",desc:"오렌지 포인트 러닝화",price:199000,oldPrice:229000,image:"images/신발/images8.jpg",category:"shoes",sale:true},
  {name:"Adidas Superstar Platform",desc:"화이트 플랫폼 슈즈",price:159000,oldPrice:0,image:"images/신발/images9.jpg",category:"shoes",sale:false},
  {name:"Adidas Predator Soccer",desc:"축구화",price:219000,oldPrice:259000,image:"images/신발/images10.jpg",category:"shoes",sale:true},
  {name:"Adidas Court White",desc:"화이트 캐주얼 스니커즈",price:79000,oldPrice:99000,image:"images/신발/images1.jpg",category:"shoes",sale:true},
  {name:"Adidas Black Superstar",desc:"블랙 슈퍼스타",price:129000,oldPrice:0,image:"images/신발/images2.jpg",category:"shoes",sale:false},
  {name:"Adidas Japan Classic",desc:"아이보리 클래식 슈즈",price:149000,oldPrice:0,image:"images/신발/images3.jpg",category:"shoes",sale:false},
  {name:"Adidas Training White",desc:"화이트 데일리 러닝화",price:89000,oldPrice:0,image:"images/신발/images4.jpg",category:"shoes",sale:false},
  {name:"Adidas Black Leather",desc:"블랙 레더 슈즈",price:119000,oldPrice:0,image:"images/신발/images5.jpg",category:"shoes",sale:false},

  {name:"Adidas Black Hoodie",desc:"블랙 후드 집업",price:99000,oldPrice:0,image:"images/의류/images16.jpg",category:"clothes",sale:false},
  {name:"Adidas Oasis Jersey",desc:"블랙 반팔 저지",price:89000,oldPrice:0,image:"images/의류/images17.jpg",category:"clothes",sale:false},
  {name:"Adidas Navy Track Jacket",desc:"네이비 트랙 자켓",price:119000,oldPrice:149000,image:"images/의류/images18.jpg",category:"clothes",sale:true},
  {name:"Adidas Navy Wind Jacket",desc:"네이비 바람막이",price:139000,oldPrice:0,image:"images/의류/images11.jpg",category:"clothes",sale:false},
  {name:"Adidas Black Track Jacket",desc:"블랙 트랙 자켓",price:109000,oldPrice:0,image:"images/의류/images12.jpg",category:"clothes",sale:false},
  {name:"Adidas Classic Zip Jacket",desc:"블랙 집업 자켓",price:99000,oldPrice:129000,image:"images/의류/images13.jpg",category:"clothes",sale:true},
  {name:"Adidas Cream Track Jacket",desc:"크림 트랙 자켓",price:129000,oldPrice:159000,image:"images/의류/images14.jpg",category:"clothes",sale:true},
  {name:"Adidas Gray Training Pants",desc:"그레이 트레이닝 팬츠",price:79000,oldPrice:0,image:"images/의류/images15.jpg",category:"clothes",sale:false}
];

let currentProducts = [...products];
let cart = [];

const grid = document.getElementById("productGrid");
const pageTitle = document.getElementById("pageTitle");
const countText = document.getElementById("countText");

function renderProducts(list){
  grid.innerHTML = "";
  countText.innerText = list.length + "개 상품";

  if(list.length === 0){
    grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#777;font-size:22px;padding:80px 0;">검색 결과가 없습니다</p>`;
    return;
  }

  list.forEach(product => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="img-box">
        <span class="badge ${product.sale ? "sale" : ""}">${product.sale ? "세일" : "NEW"}</span>
        <button class="heart" onclick="toggleHeart(this)">♡</button>
        <img src="${product.image}" alt="${product.name}">
        <button class="cart-btn" onclick="addToCart('${product.name}')">🛍 장바구니 담기</button>
      </div>

      <div class="colors">
        <span class="dot black"></span>
        <span class="dot white"></span>
        <span class="dot gray"></span>
      </div>

      <h3>${product.name}</h3>
      <p class="desc">${product.desc}</p>
      <p class="price">
        ₩${product.price.toLocaleString()}
        ${product.oldPrice ? `<span class="old">₩${product.oldPrice.toLocaleString()}</span>` : ""}
      </p>
    `;

    grid.appendChild(card);
  });
}

function filterProducts(category){
  document.querySelectorAll(".nav").forEach(link => {
    link.classList.remove("active");
    if(link.dataset.category === category) link.classList.add("active");
  });

  if(category === "all"){
    currentProducts = [...products];
    pageTitle.innerText = "인기 상품";
  } else if(category === "sale"){
    currentProducts = products.filter(p => p.sale);
    pageTitle.innerText = "세일";
  } else if(category === "shoes"){
    currentProducts = products.filter(p => p.category === "shoes");
    pageTitle.innerText = "신발";
  } else if(category === "clothes"){
    currentProducts = products.filter(p => p.category === "clothes");
    pageTitle.innerText = "의류";
  }

  renderProducts(currentProducts);
  scrollProducts();
}

function sortProducts(type){
  if(type === "low"){
    currentProducts.sort((a,b)=>a.price-b.price);
  } else if(type === "high"){
    currentProducts.sort((a,b)=>b.price-a.price);
  }

  renderProducts(currentProducts);
}

function toggleSearch(){
  document.getElementById("searchBox").classList.toggle("active");
}

function searchProducts(){
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

  currentProducts = products.filter(product =>
    product.name.toLowerCase().includes(keyword) ||
    product.desc.toLowerCase().includes(keyword) ||
    product.category.toLowerCase().includes(keyword)
  );

  pageTitle.innerText = "검색 결과";
  renderProducts(currentProducts);
  scrollProducts();
}

function openLogin(){
  document.getElementById("loginModal").classList.add("active");
}

function closeLogin(){
  document.getElementById("loginModal").classList.remove("active");
}

function addToCart(name){
  const product = products.find(p => p.name === name);
  const item = cart.find(p => p.name === name);

  if(item) item.qty++;
  else cart.push({...product, qty:1});

  updateCart();
  openCart();
}

function updateCart(){
  const cartItems = document.getElementById("cartItems");
  const cartCount = document.getElementById("cartCount");
  const cartTotal = document.getElementById("cartTotal");

  cartItems.innerHTML = "";
  let total = 0;
  let count = 0;

  cart.forEach(item => {
    total += item.price * item.qty;
    count += item.qty;

    cartItems.innerHTML += `
      <div class="cart-item">
        <img src="${item.image}">
        <div>
          <h4>${item.name}</h4>
          <p>₩${item.price.toLocaleString()}</p>
          <div class="qty">
            <button onclick="changeQty('${item.name}',-1)">-</button>
            <span>${item.qty}</span>
            <button onclick="changeQty('${item.name}',1)">+</button>
          </div>
        </div>
      </div>
    `;
  });

  if(cart.length === 0){
    cartItems.innerHTML = `<p style="text-align:center;margin-top:120px;color:#777;">장바구니가 비어 있습니다</p>`;
  }

  cartCount.innerText = count;
  cartTotal.innerText = "총 금액: ₩" + total.toLocaleString();
}

function changeQty(name,amount){
  const item = cart.find(p => p.name === name);
  if(!item) return;

  item.qty += amount;

  if(item.qty <= 0){
    cart = cart.filter(p => p.name !== name);
  }

  updateCart();
}

function openCart(){
  document.getElementById("cart").classList.add("active");
}

function closeCart(){
  document.getElementById("cart").classList.remove("active");
}

function toggleHeart(btn){
  btn.innerText = btn.innerText === "♡" ? "♥" : "♡";
}

function scrollProducts(){
  document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

document.querySelectorAll(".nav").forEach(link=>{
  link.addEventListener("click",(e)=>{
    e.preventDefault();
    filterProducts(link.dataset.category);
  });
});

renderProducts(products);
updateCart();
</script>

</body>
</html>
